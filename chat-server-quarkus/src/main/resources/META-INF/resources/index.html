<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Equipo 5 - WebSocket Test</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #chat { height: 300px; border: 1px solid #ddd; overflow-y: scroll; padding: 10px; background: #f9f9f9; }
        input { width: 80%; padding: 10px; }
        button { padding: 10px; }
    </style>
</head>
<body>
    <h2>Chat Servidor Quarkus</h2>
    <div id="chat"></div>
    <br>
    <input type="text" id="msg" placeholder="Escribe un mensaje...">
    <button onclick="send()">Enviar</button>

    <script>
        const name = "User_" + Math.floor(Math.random() * 100);
        const socket = new WebSocket("ws://localhost:8080/chat/" + name);

        socket.onmessage = function(m) {
            document.getElementById("chat").innerHTML += m.data + "<br>";
        };

        function send() {
            const input = document.getElementById("msg");
            socket.send(input.value);
            input.value = "";
        }
    </script>
</body>
</html>
